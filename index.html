<h1 class="entry-title">Dev seichi915へようこそ</h1>
</header>
<div class="entry-content">
<h5>Dev seichi915とは?</h5>
<p>Team seichi915で使用している独自プラグインなどの開発を行う開発チームのことです。</p>
<h5>どうすれば開発に参加できる?</h5>
<p>すべてOSSとして公開されているため、いつでもだれでも開発に参加できます。<br>seichi915NetworkのDiscordサーバーに参加し、Dev seichi915ロールを取得すると、Dev seichi915に関する様々なお知らせ等を受け取ることができます。</p>
<h5>プログラミングなんもわからんマンでも大丈夫?</h5>
<p>はい。<br>実際に開発に参加せずに、新機能の提案などのみでも可能です。</p>
<h5>開発言語は?</h5>
<p>Team seichi915では主に ScalaとTypeScript を使用しています。</p>
